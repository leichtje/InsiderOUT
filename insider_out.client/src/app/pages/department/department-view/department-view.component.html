<div class="page-container layout-container">
    
    <div class="sidebar">
        <h3>Departments</h3>
        
        <div cdkDropList class="drop-list" (cdkDropListDropped)="drop($event)">
            @for (dept of departments(); track dept.departmentId) {
            <div 
                cdkDrag 
                class="drop-list-item"
                [ngClass]="{'selected': dept.departmentId === selectedDepartment()?.departmentId}"
                (click)="selectDepartment(dept.departmentId)">
                
                <span class="drag-handle" cdkDragHandle>≡</span>
                <span class="status-indicator" [ngClass]="{'active': dept.isActive}"></span>
                {{ dept.department }} 
                <button (click)="onCreate(); $event.stopPropagation()">
                    <mat-icon>add</mat-icon>
                </button>
                
            </div>
            } @empty {
            <p>No departments found.</p>
            }
        </div>
        </div>

    <div class="main-content">
        @if (selectedDepartment(); as selected) {
            <div class="details-card" [formGroup]="form">
            <h2>Edit Department</h2>
            
            <div class="form-group">
                <label for="departmentTitle">Title:</label>
                <input id="departmentTitle" type="text" formControlName="department" class="form-control" />
            </div>

            <div class="form-group checkbox-group">
                <label>
                <input type="checkbox" formControlName="isActive" />
                Is Active
                </label>
            </div>

            <io-action-bar
                [isOpen]="form.dirty"
                [isValid]="form.valid"
                (save)="onSave()"
                (cancel)="onCancel()">
            </io-action-bar>

            </div>
        } @else {
            <div class="empty-state">
            <p>Select a department from the left to view details.</p>
            </div>
        }
    </div>

</div>
