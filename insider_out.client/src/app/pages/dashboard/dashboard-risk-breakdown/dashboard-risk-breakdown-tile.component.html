<div class="tile-container">
    <div>
        <div class="dashboard-title">Overall Company Risk</div>
        <io-percent-ring class="overall-company-risk" [percentage]="overallCompanyRisk$()" [size]="100" [strokeWidth]="5"></io-percent-ring>
    </div>

    <div class="divider"></div>

    <div>
        <div class="dashboard-title">Riskiest Employees</div>
                
        <div class="risk-section">
            <div class="risk-list">
                @for (subject of topSubjects$(); track subject.subjectId) {
                    <div class="risk-list-item">
                        
                        <span class="item-name">{{ subject.firstName + ' ' + subject.lastName}}</span>
                        
                        <io-percent-ring 
                        [percentage]="subject.riskScore" 
                        [size]="40" 
                        [strokeWidth]="4">
                    </io-percent-ring>
                </div>
            } @empty {
                <p class="empty-state">No employee data available.</p>
            }
        </div>
    </div>
</div>

</div>
