<io-dialog-header
    title="Add Activity"
    (close)="closeDialog()"
    >

</io-dialog-header><mat-dialog-content>
    <form [formGroup]="form">
        <mat-form-field appearance="outline">
            <mat-label>What happened?</mat-label>
            <textarea matInput 
                    formControlName="content" 
                    cdkTextareaAutosize 
                    cdkAutosizeMinRows="3" 
                    placeholder="Describe the update or action taken...">
            </textarea>
            @if (form.get('content')?.hasError('required') && form.get('content')?.touched) {
                <mat-error>Activity details are required</mat-error>
            }
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="onSubmit()">Save Activity</button>
</mat-dialog-actions>
