<div class="progress-node">
    
    <div class="ring-wrapper" [style.width.px]="size" [style.height.px]="size">
        
        <span class="progress-label" [style.font-size.px]="size * 0.28">
            {{ percentage }}%
        </span>
        
        <svg class="progress-ring" [attr.width]="size" [attr.height]="size">
            <circle
                class="track"
                [attr.stroke-width]="strokeWidth"
                fill="transparent"
                [attr.r]="radius"
                [attr.cx]="center"
                [attr.cy]="center"
            />
            <circle
                class="progress"
                [attr.stroke-width]="strokeWidth"
                fill="transparent"
                [attr.r]="radius"
                [attr.cx]="center"
                [attr.cy]="center"
                [style.stroke-dasharray]="circumference"
                [style.stroke-dashoffset]="getDashOffset()"
                [style.stroke]="getColor()"
            />
        </svg>
    </div>

    @if (label) {
        <div class="progress-text">{{ label }}</div>
    }
</div>
